linters:
  enable:
    - errcheck # unchecked error return values
    - gosimple # code that can be simplified
    - govet # suspicious constructs (default vet checks)
    - ineffassign # assignments never used before being overwritten
    - staticcheck # bugs and non-idiomatic code (Go's de facto standard linter)
    - unused # unused constants, variables, functions, types
    - gosec # common security issues (injection, weak crypto, etc.)
    - misspell # misspelled words in comments and strings
    - gofmt # not formatted with gofmt
    - goimports # imports not gofmt'd / not grouped correctly
    - gocritic # opinionated style, diagnostic, and performance checks
    - revive # configurable stylistic and correctness rules (golint replacement)
    - goconst # repeated string literals that should be constants
    - nilerr # returning nil when checking an error that is non-nil
    - bodyclose # HTTP response bodies not closed
    - noctx # HTTP requests without context.Context

linters-settings:
  gosec:
    excludes:
      - G304
      - G306
  goconst:
    min-len: 3
    min-occurrences: 4
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
      - unnamedResult
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        disabled: true
      - name: if-return
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor

run:
  timeout: 5m
  tests: true
