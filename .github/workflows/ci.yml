# Copy to .github/workflows/ci.yml in your project.
# Adjust the Go version (via go.mod) and cache paths as needed.
# Requires go/verifications/Makefile copied to the project root (check-strict target).
# check-strict shells out to gofumpt and golangci-lint, so both are installed below.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: go install mvdan.cc/gofumpt@latest
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: make check-strict
